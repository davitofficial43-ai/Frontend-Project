<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
       <style>
        .icon{
            width: 25px;
            height: 25px;
        }
       </style> 
</head>
<body>
    <form class="bg-white w-25 m-auto p-2 border border-1 rounded-3 mt-5">
        <h2 class="text-center">Signup</h2>

        <div class="d-flex flex-column gap-3 mt-3">
            <input type="text" placeholder="Email" class="form-control">
            <input type="text" placeholder="Creat password" class="form-control">
            <input type="text" placeholder="Confirm password" class="form-control">
        </div>
         
        <div class="mt-3">
            <button class="w-100 btn btn-primary">Signup</button>
        </div>

        <div class="text-secondary text-center">
            <p>Already have account? <a href="LoginForm.html">Login</a></p>
        </div>

        <div class="d-flex gap-2">
            <hr class="w-100">
            <p class="text-secondary">or</p>
            <hr class="w-100">
        </div>

        <div class="d-flex flex-column gap-3">
            <button class="w-100 btn btn-primary" style="display: flex; gap: 50px;"><img class="icon"  src="https://img.icons8.com/?size=100&id=118497&format=png&color=000000" alt="">Login with Facebook</button>
            <button class="w-100 btn btn-secondary" style="display: flex; gap: 56px;"><img class="icon" src="https://img.icons8.com/?size=100&id=17949&format=png&color=000000" alt="">Login with Google</button>
        </div>
    </form>
</body>
</html>
