<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            border-radius: 35px;
        }
        .card{
            width: 380px;
            position: relative;
            margin: 50px 550px;
            border: 1px solid gray;
            line-height: 30px;
            position: relative;
            box-shadow: 0 0 5px gray;
            border: none;
            padding: 6px 6px;
        }
        .top{
            width: 100%;
            height: 200px;
            border-radius:30px;
            box-shadow: 0 0 3px rgb(84, 81, 81); 
            background-image: url("https://www.highreshdwallpapers.com/wp-content/uploads/2014/03/Cristiano-Ronaldo-HD-Wallpaper.jpg");
            background-repeat: no-repeat;
            background-size: cover;
        }    
        .bottom{
            width: 100%;
            height: 250px;
            padding:55px 25px;
        }
        .name{
            font-size: 35px;
            font-weight: 600;
            color: rgb(44, 44, 44); 
        }
        .text{
            color: rgb(82, 82, 82);
            margin-top: 6px;
        }
        .profile{
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            position: absolute;
            top: 150px;
            left: 20px;
            border: 3px solid rgb(244, 74, 74);
        }
        .follow{
            position: absolute;
            top: 10px;
            right: 15px;
            padding: 10px 25px;
            font-size: 17px;
            border: none;
            box-shadow: 0 0 5px gray;
        }

    </style>
</head>
<body>
    <div class="card">
        <div class="top"></div>
        <img class="profile" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR9yzHXXhVS26_o6zjuj96bpILkEvYdf_59QQ&s" alt="">
        <form action="">
            <button class="follow" type="submit">Follow +</button>
        </form>
        <div class="bottom">
            <p class="name">Cristaino Ronaldo</p>
            <p class="text">Product Designer who focuses on <br>
                 simplicity & usability.</p>
        </div>
    </div>
</body>
</html>
