<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .left{
            width: 50%;
        }
        .img{
           width: 100%;
           height: 100%;
           object-fit: cover;
        }
        .right{
            width: 50%;
            padding: 10px 25px 25px 25px;
        }
    </style>
</head>
<body>
    <form class="bg-white rounded-2 w-50 border border-2 d-flex p-3 m-auto">

        <div class="left me-3 rounded-2 bg-secondary">
            <img class="img" src="https://static.vecteezy.com/system/resources/thumbnails/054/122/266/small/a-cheerful-character-sitting-at-a-laptop-representing-productivity-and-creativity-png.png" alt="">
        </div>
        <div class="right">

            <div>
                <h2 class="text-center">Sign in</h2>
                <p class="text-secondary text-center mb-0">Unlock your world.</p>
            </div>

            <div>
                <label for="email" class="form-label">Email</label>
                <input id="email" type="email" placeholder="Enter your email" class="form-control">

                <label for="password" class="form-label mt-3">Password</label>
                <input type="password" id="password" placeholder="Enter your password" class="form-control">
            </div>

            <div class="mt-4 d-flex flex-column gap-3">
                <button type="" class="btn btn-primary">Sign in</button>
                <button type="" class="btn btn-outline-secondary">Create an account</button>
            </div>
        </div>
    </form>
</body>
</html>
