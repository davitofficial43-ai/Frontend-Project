    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .card {
        /* width: 100%; */
        background-color: rgb(215, 212, 212);
        padding: 10px 10px;
        font-family: sans-serif;
        margin: 0 30px;
    }
    .container{
        width: 100%;
        height: 100%;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: 430px;
    }
    .box {
        background-color: rgb(243, 241, 241);
        padding: 10px 10px;
        border-radius: 5px;
      }
      .top{
        width: 100%;
        height: 60%;
        box-shadow: 0 0 2px gray;
        border-radius: 10px;
      }
      .bottom{
        width: 100%;
        height: 40%;
        margin-top: 10px;
        line-height: 30px;
      }
      .img{
        width: 100%;
        height: 100%;
        border-radius: 10px;
        /* background-size: cover;
        object-fit: cover; */
      }
      .p1{
        font-family: sans-serif;
        font-weight: 600;
        font-size: 20px;
      }
      a{
        text-decoration: none;
      }
    </style>
